<!DOCTYPE html>
<html>
<head>
    <title>Campus Placement Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Campus Placement Management System</h1>
    <p>Student, Company, Job and Application Management</p>
</header>

<nav>
    <button onclick="showSection('students')">Students</button>
    <button onclick="showSection('companies')">Companies</button>
    <button onclick="showSection('jobs')">Jobs</button>
    <button onclick="showSection('applications')">Applications</button>
</nav>

<main>

    <!-- Student Section -->
    <section id="students" class="section">
        <h2>Student Management</h2>

        <div class="form-card">
            <input id="studentId" type="number" placeholder="Student ID">
            <input id="studentName" type="text" placeholder="Name">
            <input id="studentEmail" type="email" placeholder="Email">
            <input id="studentCourse" type="text" placeholder="Course">
            <input id="studentBranch" type="text" placeholder="Branch">
            <input id="studentCgpa" type="number" step="0.1" placeholder="CGPA">
            <input id="studentSkills" type="text" placeholder="Skills">
            <button onclick="addStudent()">Add Student</button>
        </div>

        <button onclick="loadStudents()">Load Students</button>
        <div id="studentsData" class="data-box"></div>
    </section>

    <!-- Company Section -->
    <section id="companies" class="section hidden">
        <h2>Company Management</h2>

        <div class="form-card">
            <input id="companyId" type="number" placeholder="Company ID">
            <input id="companyName" type="text" placeholder="Company Name">
            <input id="companyEmail" type="email" placeholder="Email">
            <input id="companyLocation" type="text" placeholder="Location">
            <input id="companyIndustry" type="text" placeholder="Industry">
            <button onclick="addCompany()">Add Company</button>
        </div>

        <button onclick="loadCompanies()">Load Companies</button>
        <div id="companiesData" class="data-box"></div>
    </section>

    <!-- Job Section -->
    <section id="jobs" class="section hidden">
        <h2>Job Posting</h2>

        <div class="form-card">
            <input id="jobCompanyId" type="number" placeholder="Approved Company ID">
            <input id="jobId" type="number" placeholder="Job ID">
            <input id="jobTitle" type="text" placeholder="Job Title">
            <input id="jobDescription" type="text" placeholder="Description">
            <input id="jobSalary" type="number" placeholder="Salary">
            <input id="jobLocation" type="text" placeholder="Location">
            <input id="jobSkills" type="text" placeholder="Required Skills">
            <button onclick="addJob()">Add Job</button>
        </div>

        <button onclick="loadJobs()">Load Jobs</button>
        <div id="jobsData" class="data-box"></div>
    </section>

    <!-- Application Section -->
    <section id="applications" class="section hidden">
        <h2>Job Applications</h2>

        <div class="form-card">
            <input id="applicationId" type="number" placeholder="Application ID">
            <input id="applicationStudentId" type="number" placeholder="Student ID">
            <input id="applicationJobId" type="number" placeholder="Job ID">
            <button onclick="applyForJob()">Apply For Job</button>
        </div>

        <div class="form-card">
            <input id="statusApplicationId" type="number" placeholder="Application ID">
            <select id="applicationStatus">
                <option value="SHORTLISTED">SHORTLISTED</option>
                <option value="INTERVIEW">INTERVIEW</option>
                <option value="SELECTED">SELECTED</option>
                <option value="REJECTED">REJECTED</option>
            </select>
            <button onclick="updateApplicationStatus()">Update Status</button>
        </div>

        <button onclick="loadApplications()">Load Applications</button>
        <div id="applicationsData" class="data-box"></div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
